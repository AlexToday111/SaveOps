global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
  - job_name: account-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["account-service:8081"]
  - job_name: goal-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["goal-service:8082"]
  - job_name: transaction-simulator-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["transaction-simulator-service:8083"]
  - job_name: interest-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["interest-service:8084"]
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8085"]
  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["audit-service:8086"]

